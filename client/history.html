<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Play3CR — Lịch sử ván đấu</title>
  <meta name="description" content="Xem lại và phát lại các ván Caro đã chơi trên Play3CR." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&amp;subset=vietnamese&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css?v=14" />
  <link rel="stylesheet" href="css/history.css?v=14" />
  <!-- Google Fonts: Manrope -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

</head>
<body>

<!-- ── Top Nav ──────────────────────────────────────────────────────────── -->
<nav class="topnav" aria-label="Main navigation">
  <a href="index.html" class="topnav__brand">
    <span class="topnav__title">Play3CR</span>
  </a>
  <div class="topnav__right">
    <a href="index.html" class="topnav__btn" style="text-decoration:none;" title="Sảnh">
      <i class="ph-bold ph-house" style="font-size: 16px;"></i>
      <span class="hide-on-mobile">Sảnh</span>
    </a>
  </div>
</nav>

<!-- ── Main Content ────────────────────────────────────────────────────── -->
<main class="history" role="main">

  <!-- Game List View -->
  <div id="view-list">
    <div class="history__header">
      <h1>Lịch sử ván đấu</h1>
      <span id="game-total" class="history__count"></span>
    </div>
    <div id="game-list" class="game-list">
      <div class="game-list__empty">Đang tải...</div>
    </div>
    <div id="pagination" class="pagination"></div>
  </div>

  <!-- Replay View (hidden by default) -->
  <div id="view-replay" class="replay" style="display:none;">
    <div class="replay__top-bar">
      <button id="replay-back" class="replay__back-btn" type="button">← Quay lại</button>
      <button id="btn-analysis" class="replay__analysis-btn" type="button" title="Bật/tắt chế độ phân tích">🔀 Phân tích</button>
    </div>

    <div class="replay__info">
      <div class="replay__players">
        <span id="replay-black" class="replay__player replay__player--black"></span>
        <span class="replay__vs">vs</span>
        <span id="replay-white" class="replay__player replay__player--white"></span>
      </div>
      <div id="replay-result" class="replay__result"></div>
      <div id="replay-meta" class="replay__meta"></div>
    </div>

    <div class="replay__body">
      <!-- Board column -->
      <div class="replay__board-col">
        <div class="replay__board-area">
          <canvas id="replay-canvas"></canvas>
        </div>
        <div class="replay__controls">
          <button id="btn-first" class="replay__btn" type="button" title="Đầu tiên">⏮</button>
          <button id="btn-prev" class="replay__btn" type="button" title="Lùi 1 nước">◀</button>
          <span id="move-counter" class="replay__counter">0 / 0</span>
          <button id="btn-next" class="replay__btn" type="button" title="Tiến 1 nước">▶</button>
          <button id="btn-last" class="replay__btn" type="button" title="Cuối cùng">⏭</button>
          <button id="btn-play" class="replay__btn" type="button" title="Tự động phát">⏵</button>
        </div>
      </div>

      <!-- Tree panel (visible in analysis mode) -->
      <div id="tree-panel" class="replay__tree-panel" style="display:none;">
        <div class="tree-panel__header">
          <span class="tree-panel__title">Cây nước đi</span>
          <button id="btn-delete-branch" class="tree-panel__action" type="button" title="Xoá nhánh hiện tại">🗑</button>
        </div>
        <div id="tree-container" class="tree-panel__body"></div>
      </div>
    </div>
  </div>

</main>

<!-- Scripts -->
<script src="js/board.js?v=9"></script>
<script src="js/move-tree.js?v=9"></script>
<script src="js/tree-view.js?v=9"></script>
<script src="js/history.js?v=9"></script>
</body>
</html>
