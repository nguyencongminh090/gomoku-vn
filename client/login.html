<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play3CR — Đăng nhập</title>
  <meta name="description" content="Đăng nhập vào Play3CR — nền tảng chơi Caro trực tuyến với luật Wall và Portal." />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/main.css?v=7" />
</head>
<body>

<div class="page">
  <main class="card" role="main">

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <header class="card__header">
      <div class="card__logo">
        <!-- Flat board icon: 3×3 grid of dots -->
        <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="36" height="36" rx="4" fill="rgba(255,255,255,0.12)"/>
          <!-- Grid lines -->
          <line x1="12" y1="6" x2="12" y2="30" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
          <line x1="24" y1="6" x2="24" y2="30" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
          <line x1="6" y1="12" x2="30" y2="12" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
          <line x1="6" y1="24" x2="30" y2="24" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
          <!-- Black piece (X) -->
          <line x1="9" y1="9" x2="15" y2="15" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="15" y1="9" x2="9" y2="15" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          <!-- White piece (O) -->
          <circle cx="24" cy="24" r="4" fill="white"/>
          <!-- Star points -->
          <circle cx="12" cy="24" r="1.5" fill="rgba(255,255,255,0.6)"/>
          <circle cx="24" cy="12" r="1.5" fill="rgba(255,255,255,0.6)"/>
        </svg>
        <h1 class="card__title">Play3CR</h1>
      </div>
      <p class="card__subtitle" data-i18n="login.subtitle">Cờ Caro trực tuyến — Luật Wall &amp; Portal</p>
    </header>

    <!-- ── Tabs ───────────────────────────────────────────────────────── -->
    <nav class="tabs" role="tablist" aria-label="Chế độ đăng nhập">
      <button
        id="tab-login"
        class="tab-btn active"
        role="tab"
        aria-selected="true"
        aria-controls="panel-login"
        onclick="switchTab('login')"
        data-i18n="login.tab_login"
      >Đăng nhập</button>
      <button
        id="tab-register"
        class="tab-btn"
        role="tab"
        aria-selected="false"
        aria-controls="panel-register"
        onclick="switchTab('register')"
        data-i18n="login.tab_register"
      >Đăng ký</button>
    </nav>

    <!-- ── Global alert banner ────────────────────────────────────────── -->
    <div id="alert-banner" class="alert alert-error" role="alert" aria-live="polite"></div>

    <!-- ── Login Panel ────────────────────────────────────────────────── -->
    <section id="panel-login" class="panel active" role="tabpanel" aria-labelledby="tab-login">
      <form id="form-login" novalidate>

        <div class="field">
          <label for="login-username" data-i18n="login.username">Tên đăng nhập</label>
          <input
            id="login-username"
            type="text"
            name="username"
            data-i18n-placeholder="login.ph_username"
            placeholder="Nhập tên đăng nhập"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            required
          />
          <span class="field-error" id="err-login-username"></span>
        </div>

        <div class="field">
          <label for="login-password" data-i18n="login.password">Mật khẩu</label>
          <input
            id="login-password"
            type="password"
            name="password"
            data-i18n-placeholder="login.ph_password"
            placeholder="Nhập mật khẩu"
            autocomplete="current-password"
            required
          />
          <span class="field-error" id="err-login-password"></span>
        </div>

        <button id="btn-login" type="submit" class="btn btn-primary" data-i18n="login.btn_login">
          Đăng nhập
        </button>
      </form>
    </section>

    <!-- ── Register Panel ─────────────────────────────────────────────── -->
    <section id="panel-register" class="panel" role="tabpanel" aria-labelledby="tab-register">
      <form id="form-register" novalidate>

        <div class="field">
          <label for="reg-username" data-i18n="login.username">Tên đăng nhập</label>
          <input
            id="reg-username"
            type="text"
            name="username"
            data-i18n-placeholder="login.ph_reg_user"
            placeholder="3-20 ký tự, chữ/số/gạch dưới"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            required
          />
          <span class="field-error" id="err-reg-username"></span>
        </div>

        <div class="field">
          <label for="reg-display" data-i18n="login.display_name">Tên hiển thị</label>
          <input
            id="reg-display"
            type="text"
            name="displayName"
            data-i18n-placeholder="login.ph_display"
            placeholder="Tên xuất hiện trong phòng"
            autocomplete="nickname"
            maxlength="24"
            required
          />
          <span class="field-error" id="err-reg-display"></span>
        </div>

        <div class="field">
          <label for="reg-password" data-i18n="login.password">Mật khẩu</label>
          <input
            id="reg-password"
            type="password"
            name="password"
            data-i18n-placeholder="login.ph_reg_pass"
            placeholder="Ít nhất 6 ký tự"
            autocomplete="new-password"
            required
          />
          <span class="field-error" id="err-reg-password"></span>
        </div>

        <div class="field">
          <label for="reg-confirm" data-i18n="login.confirm_pass">Xác nhận mật khẩu</label>
          <input
            id="reg-confirm"
            type="password"
            name="confirmPassword"
            data-i18n-placeholder="login.ph_confirm"
            placeholder="Nhập lại mật khẩu"
            autocomplete="new-password"
            required
          />
          <span class="field-error" id="err-reg-confirm"></span>
        </div>

        <button id="btn-register" type="submit" class="btn btn-primary" data-i18n="login.btn_register">
          Tạo tài khoản
        </button>
      </form>
    </section>

    <!-- ── Divider + Guest ─────────────────────────────────────────────── -->
    <div class="divider"><span data-i18n="login.divider">hoặc</span></div>

    <div class="guest-section">
      <button id="btn-guest" class="btn btn-guest" type="button" data-i18n="login.btn_guest">
        Chơi như khách
      </button>
    </div>

  </main><!-- /.card -->

  <footer class="page-footer" data-i18n="login.footer">
    Play3CR &nbsp;·&nbsp; Self-hosted &nbsp;·&nbsp; Dữ liệu lưu cục bộ
  </footer>
</div><!-- /.page -->

<script src="js/i18n.js"></script>
<script src="js/login.js"></script>
</body>
</html>
